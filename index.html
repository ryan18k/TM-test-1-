<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Traitement Moral">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#040508">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Traitement Moral</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="progress-bar"></div>

<!-- SPLASH -->
<div id="splash-screen">
  <div id="splash-inner">
    <div id="splash-title">
      <span class="big">T</span>raitement&nbsp;<span class="big">M</span>oral
    </div>
    <div id="splash-sub">par Ryan Debabêche</div>
    <button id="splash-btn">commencer</button>
  </div>
</div>

<!-- ACT OVERLAY -->
<div id="act-overlay"><div id="act-title-text"></div></div>

<!-- FADE -->
<div id="fade-overlay"></div>

<!-- LOCATION BANNER -->
<div id="location-banner">
  <div id="location-banner-inner">
    <div id="location-place"></div>
    <div id="location-time"></div>
  </div>
</div>

<!-- SCENE -->
<div id="scene">
  <div id="stage">
    <div class="char-slot left hidden"  id="slot-left"></div>
    <div class="char-slot right hidden" id="slot-right"></div>
    <div class="char-slot center hidden" id="slot-center"></div>
  </div>
  <div id="dialogue-box">
    <div id="speaker-name"></div>
    <div id="dialogue-text"></div>
    <button id="continue-btn" class="pulse">continuer</button>
  </div>
</div>

<!-- MINIGAME -->
<div id="mg-banner">
  <div id="mg-banner-inner">
    <div id="mg-banner-title"></div>
    <div id="mg-banner-sub"></div>
  </div>
</div>
<div id="mg-counter-errors" style="display:none">
  <div><div class="mg-count-val" id="mg-err-val">0</div><div class="mg-count-label">erreurs</div></div>
</div>
<div id="mg-counter-score" style="display:none">
  <div><div class="mg-count-val" id="mg-score-val">0</div><div class="mg-count-label">réussites</div></div>
</div>
<div id="minigame-container">
  <canvas id="minigame-canvas"></canvas>
</div>

<!-- CHOICE -->
<div id="choice-screen">
  <div class="choice-half" id="choice-left" onclick="makeChoice('left')">
    <div class="pulse-dot" id="pulse-left"></div>
    <div class="choice-label" id="choice-left-text"></div>
    <div class="choice-sublabel" id="choice-left-sub"></div>
  </div>
  <div class="choice-half" id="choice-right" onclick="makeChoice('right')">
    <div class="pulse-dot" id="pulse-right"></div>
    <div class="choice-label" id="choice-right-text"></div>
    <div class="choice-sublabel" id="choice-right-sub"></div>
  </div>
  <div id="choice-timer">10</div>
</div>

<!-- END SCREEN -->
<div id="end-screen">
  <div id="end-content"></div>
  <div id="end-title-display"><span class="big">T</span>raitement&nbsp;<span class="big">M</span>oral</div>
  <div id="end-buttons">
    <button id="restart-btn" onclick="restartGame()">recommencer</button>
    <button id="credits-btn" onclick="showCredits()">crédits</button>
  </div>
</div>

<!-- CREDITS -->
<div id="credits-screen">
  <h2><span style="font-size:1.18em;color:#5a6878">T</span>raitement&nbsp;<span style="font-size:1.18em;color:#5a6878">M</span>oral</h2>
  <p style="color:#5a6070;font-style:italic;margin-bottom:24px">Un jeu narratif sur l'éthique médicale</p>
  <p class="credit-role">Conception &amp; Narration</p>
  <p>Ryan Debabêche</p>
  <p class="credit-role">Travail de Maturité</p>
  <p>2025</p>
  <button id="credits-back" onclick="hideCredits()">retour</button>
</div>

<!-- GAME TITLE -->
<div id="game-title">
  <span style="color:#1e2840;font-size:1.15em">T</span>raitement
  <span style="color:#1e2840;font-size:1.15em">M</span>oral
</div>

<!-- PORTRAITS -->
<div id="portrait-store" style="display:none"></div>

<!-- SCRIPTS -->
<script src="engine.js"></script>
<script src="story.js"></script>

</body>
</html>
